<div class="container">
  <h2>🏷️ Gestão de Categorias</h2>

  <div *ngIf="mensagemSucesso" class="alert alert-success" style="color: green; margin-bottom: 10px;">{{ mensagemSucesso }}</div>
  <div *ngIf="mensagemErro" class="alert alert-danger" style="color: red; margin-bottom: 10px;">{{ mensagemErro }}</div>

  <div class="card-cadastro" style="background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd;">
    <h3 style="margin-top: 0;">+ Cadastrar Nova Categoria</h3>
    <div style="display: flex; gap: 10px; align-items: center;">
      <input 
        type="text" 
        [(ngModel)]="novaCategoriaNome" 
        placeholder="Ex: Frutas, Legumes, Grãos..." 
        style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px;"
      >
      <button 
        (click)="adicionarCategoria()" 
        style="background-color: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;"
      >
        Cadastrar
      </button>
    </div>
  </div>

  <table *ngIf="categorias.length > 0; else semCategorias" style="width: 100%; border-collapse: collapse; margin-top: 20px;">
    <thead>
      <tr style="background-color: #f1f1f1; text-align: left;">
        <th style="padding: 10px; border-bottom: 2px solid #ddd;">ID</th>
        <th style="padding: 10px; border-bottom: 2px solid #ddd;">Nome</th>
        <th style="padding: 10px; border-bottom: 2px solid #ddd;">Ações</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let cat of categorias" style="border-bottom: 1px solid #ddd;">
        <td style="padding: 10px;">{{ cat.id }}</td>
        <td style="padding: 10px;">
          <span *ngIf="categoriaEmEdicao?.id !== cat.id">{{ cat.nome }}</span>
          <input *ngIf="categoriaEmEdicao?.id === cat.id" [(ngModel)]="nomeEditando" type="text" style="padding: 5px; width: 100%;">
        </td>
        <td style="padding: 10px; gap: 5px; display: flex;">
          <ng-container *ngIf="categoriaEmEdicao?.id !== cat.id">
            <button style="background: #f1c40f; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;" (click)="iniciarEdicao(cat)">✏️ Editar</button>
            <button style="background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;" (click)="remover(cat.id)">🗑️ Excluir</button>
          </ng-container>
          <ng-container *ngIf="categoriaEmEdicao?.id === cat.id">
            <button style="background: #2ecc71; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;" (click)="salvarEdicao()">💾 Salvar</button>
            <button style="background: #95a5a6; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;" (click)="cancelarEdicao()">Cancelar</button>
          </ng-container>
        </td>
      </tr>
    </tbody>
  </table>

  <ng-template #semCategorias>
    <p style="margin-top: 20px; color: #7f8c8d;">Nenhuma categoria cadastrada no banco de dados.</p>
  </ng-template>
</div>
