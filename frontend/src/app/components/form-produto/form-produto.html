<div class="form-container">
  <h2>➕ Cadastrar Novo Produto</h2>

  <div *ngIf="mensagemSucesso" class="alert alert-success">
    {{ mensagemSucesso }}
  </div>
  <div *ngIf="mensagemErro" class="alert alert-danger">
    {{ mensagemErro }}
  </div>

  <form (ngSubmit)="salvar()" #insumoForm="ngForm">
    
    <div class="form-group">
      <label for="nome">Nome do Produto:</label>
      <input type="text" id="nome" name="nome" [(ngModel)]="produto.nome" required placeholder="Ex: Banana Prata">
    </div>

    <div class="form-group">
      <label for="categoria">Categoria do Produto:</label>
        <select id="categoria" name="categoria" [(ngModel)]="categoriaSelecionadaId" required>
          <option [ngValue]="null" disabled>Selecione uma categoria...</option>
          <option *ngFor="let cat of categorias" [ngValue]="cat.id">{{ cat.nome }}</option>
        </select>
    </div>

    <button *ngIf="!produto.id"type="button" class="btn-salvar"(click)="salvar()" style="margin-top: 10px;">
      ➕ Cadastrar Produto
    </button>

    <button *ngIf="produto.id" type="button" class="btn-atualizar" (click)="atualizar()">
      💾 Salvar Alterações
    </button>

  </form>
</div>
